apiVersion: apps/v1
kind: Deployment
metadata:
  name: typepanel
  namespace: typepanel
  labels:
    app: typepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: typepanel
  template:
    metadata:
      labels:
        app: typepanel
    spec:
      containers:
        - name: typepanel
          # Image hosted in GHCR, built from this repo
          image: ghcr.io/jalenfran/typepanel:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: RUST_LOG
              value: "info"
          ports:
            - containerPort: 3000
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 1
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
