apiVersion: apps/v1
kind: Deployment
metadata:
  name: typepanel
  namespace: typepanel
  labels:
    app: typepanel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: typepanel
  template:
    metadata:
      labels:
        app: typepanel
    spec:
      containers:
        - name: typepanel
          # Image hosted in GHCR, built from this repo
          image: ghcr.io/jalenfran/typepanel:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

